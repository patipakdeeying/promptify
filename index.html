<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promptify Files - Convert Code to Prompts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .drag-active {
            border-color: #3b82f6;
            background-color: #eff6ff;
            transform: scale(1.01);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-bold text-slate-900 mb-2 flex items-center justify-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-600"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M9 15l2 2 4-4"/></svg>
                Promptify Files
            </h1>
            <p class="text-slate-600">Convert your codebase into a structured prompt for AI models.</p>
        </header>

        <!-- Main Controls -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <label class="flex flex-col items-center justify-center p-8 bg-white border-2 border-dashed border-slate-300 rounded-2xl cursor-pointer hover:border-blue-500 hover:bg-blue-50 transition-all group" id="dropZone">
                <input type="file" id="fileInput" multiple class="hidden">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-2 text-slate-400 group-hover:text-blue-500"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                <span class="text-sm font-medium text-slate-700">Add Files</span>
                <span class="text-xs text-slate-400 mt-1 text-center px-4">Standard files or Drag & Drop</span>
            </label>

            <label class="flex flex-col items-center justify-center p-8 bg-white border-2 border-dashed border-slate-300 rounded-2xl cursor-pointer hover:border-indigo-500 hover:bg-indigo-50 transition-all group">
                <input type="file" id="folderInput" webkitdirectory directory multiple class="hidden">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-2 text-slate-400 group-hover:text-indigo-500"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2z"/></svg>
                <span class="text-sm font-medium text-slate-700">Add Folder</span>
                <span class="text-xs text-slate-400 mt-1 text-center px-4">Recursively reads directory content</span>
            </label>
        </div>

        <!-- Options -->
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 mb-6">
            <div class="flex flex-wrap items-center justify-between gap-4">
                <div class="flex flex-wrap items-center gap-6">
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" id="ignoreBinary" checked class="w-4 h-4 text-blue-600 rounded border-slate-300 focus:ring-blue-500">
                        <span class="text-sm text-slate-700 group-hover:text-slate-900 transition-colors">Skip binary (Images/Audio)</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" id="includeTree" checked class="w-4 h-4 text-blue-600 rounded border-slate-300 focus:ring-blue-500">
                        <span class="text-sm text-slate-700 group-hover:text-slate-900 transition-colors">Include Project Tree</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" id="useCodeBlocks" checked class="w-4 h-4 text-blue-600 rounded border-slate-300 focus:ring-blue-500">
                        <span class="text-sm text-slate-900 font-semibold transition-colors">Use Markdown Blocks</span>
                    </label>
                </div>
                
                <div id="statusIndicator" class="hidden animate-fade-in text-sm font-medium text-blue-600 flex items-center gap-2 bg-blue-50 px-3 py-1 rounded-full">
                    <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Processing...
                </div>
            </div>
        </div>

        <!-- Result Area -->
        <div class="relative">
            <div id="copyNotification" class="absolute -top-12 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-medium opacity-0 transition-all transform translate-y-2 pointer-events-none z-20">
                Copied to clipboard! ✨
            </div>

            <div class="flex items-center justify-between mb-3">
                <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-400"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    Output Prompt
                </h2>
                <div class="flex items-center gap-2">
                    <button id="clearBtn" class="px-4 py-2 text-slate-500 hover:text-red-600 transition-colors text-sm font-medium">
                        Clear
                    </button>
                    <button id="copyBtn" class="flex items-center gap-2 px-5 py-2 bg-slate-900 text-white rounded-xl hover:bg-slate-800 active:scale-95 transition-all text-sm font-semibold shadow-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                        Copy to Clipboard
                    </button>
                </div>
            </div>
            
            <textarea 
                id="output" 
                readonly 
                placeholder="Upload files or a folder to generate your prompt..."
                class="w-full h-[550px] p-6 bg-slate-900 text-slate-300 font-mono text-sm rounded-3xl border border-slate-700 shadow-xl resize-none focus:outline-none focus:ring-2 focus:ring-blue-500 custom-scrollbar transition-all"
            ></textarea>
        </div>

        <footer class="mt-10 text-center">
            <p class="text-slate-400 text-xs leading-relaxed">
                Files are processed locally in your browser. No data is sent to a server. <br>
                Automatically ignores <code class="bg-slate-200 text-slate-600 px-1 rounded">node_modules</code>, <code class="bg-slate-200 text-slate-600 px-1 rounded">.git</code>, and build folders.
            </p>
        </footer>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const folderInput = document.getElementById('folderInput');
        const dropZone = document.getElementById('dropZone');
        const output = document.getElementById('output');
        const copyBtn = document.getElementById('copyBtn');
        const clearBtn = document.getElementById('clearBtn');
        const ignoreBinary = document.getElementById('ignoreBinary');
        const includeTree = document.getElementById('includeTree');
        const useCodeBlocks = document.getElementById('useCodeBlocks');
        const statusIndicator = document.getElementById('statusIndicator');
        const copyNotification = document.getElementById('copyNotification');

        const binaryExtensions = new Set([
            'png', 'jpg', 'jpeg', 'gif', 'webp', 'ico', 'pdf', 'zip', 'tar', 'gz', 
            'mp4', 'mp3', 'wav', 'ogg', 'exe', 'bin', 'dll', 'so', 'pyc', 'node', 'o', 'obj'
        ]);

        const ignoredFolders = new Set([
            'node_modules', '.git', '.next', '.cache', 'dist', 'build', '.vscode', '.idea', 'vendor', 'img', 'sound', 'fonts'
        ]);

        const extensionToLang = {
            'js': 'javascript', 'ts': 'typescript', 'jsx': 'jsx', 'tsx': 'tsx',
            'py': 'python', 'html': 'html', 'css': 'css', 'json': 'json',
            'md': 'markdown', 'sh': 'bash', 'yml': 'yaml', 'yaml': 'yaml',
            'xml': 'xml', 'java': 'java', 'c': 'c', 'cpp': 'cpp', 'cs': 'csharp',
            'go': 'go', 'rs': 'rust', 'php': 'php', 'rb': 'ruby', 'sql': 'sql',
            'lua': 'lua', 'kt': 'kotlin', 'swift': 'swift', 'dart': 'dart',
            'r': 'r', 'txt': 'text', 'env': 'text', 'local': 'text'
        };

        // --- Event Listeners ---

        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
        folderInput.addEventListener('change', (e) => handleFiles(e.target.files));

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-active');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-active');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-active');
            if (e.dataTransfer.files.length > 0) {
                handleFiles(e.dataTransfer.files);
            }
        });

        copyBtn.addEventListener('click', () => {
            copyToClipboard(output.value);
        });

        clearBtn.addEventListener('click', () => {
            output.value = '';
        });

        // --- Core Logic ---

        async function handleFiles(fileList) {
            if (!fileList || fileList.length === 0) return;
            
            statusIndicator.classList.remove('hidden');
            output.value = 'Analyzing and converting...';

            try {
                const filesArray = Array.from(fileList);
                let promptResult = "I am providing my codebase below for context. Please analyze the following project structure and file contents:\n\n";

                // 1. Generate Tree Structure
                if (includeTree.checked) {
                    promptResult += "### PROJECT STRUCTURE\n";
                    if (useCodeBlocks.checked) promptResult += "```text\n";
                    promptResult += generateFileTree(filesArray);
                    if (useCodeBlocks.checked) promptResult += "```\n";
                    promptResult += "\n";
                }

                // 2. Read Contents
                promptResult += "### FILE CONTENTS\n\n";
                
                for (const file of filesArray) {
                    const path = file.webkitRelativePath || file.name;
                    const pathParts = path.split('/');
                    
                    // Filter out ignored folders logic
                    if (pathParts.some(part => ignoredFolders.has(part))) continue;

                    const ext = file.name.split('.').pop().toLowerCase();
                    if (ignoreBinary.checked && binaryExtensions.has(ext)) continue;

                    try {
                        const text = await readFileAsText(file);
                        if (text !== null) {
                            if (useCodeBlocks.checked) {
                                const lang = extensionToLang[ext] || '';
                                promptResult += `#### File: ${path}\n`;
                                promptResult += "```" + lang + "\n";
                                promptResult += text;
                                promptResult += "\n```\n\n";
                            } else {
                                promptResult += `--- START OF FILE: ${path} ---\n`;
                                promptResult += text;
                                promptResult += `\n--- END OF FILE: ${path} ---\n\n`;
                            }
                        }
                    } catch (err) {
                        console.error(`Error reading ${file.name}:`, err);
                    }
                }

                output.value = promptResult;
                
                // Automatic Copy
                if (promptResult.trim().length > 0) {
                    copyToClipboard(promptResult);
                }

            } catch (error) {
                console.error(error);
                output.value = "An error occurred during conversion.";
            } finally {
                statusIndicator.classList.add('hidden');
            }
        }

        function generateFileTree(files) {
            const tree = {};
            files.forEach(file => {
                const path = file.webkitRelativePath || file.name;
                const parts = path.split('/');
                
                // We keep all files in tree to show structure even if we skip content
                let current = tree;
                parts.forEach((part, index) => {
                    if (!current[part]) {
                        current[part] = index === parts.length - 1 ? null : {};
                    }
                    current = current[part];
                });
            });

            function renderTree(node, prefix = '') {
                let str = '';
                const keys = Object.keys(node).sort((a, b) => {
                    if (node[a] && !node[b]) return -1;
                    if (!node[a] && node[b]) return 1;
                    return a.localeCompare(b);
                });

                keys.forEach((key, index) => {
                    const isLast = index === keys.length - 1;
                    const connector = isLast ? '└── ' : '├── ';
                    str += prefix + connector + key + (node[key] ? '/' : '') + '\n';
                    
                    if (node[key]) {
                        const newPrefix = prefix + (isLast ? '    ' : '│   ');
                        str += renderTree(node[key], newPrefix);
                    }
                });
                return str;
            }

            return renderTree(tree);
        }

        function readFileAsText(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const content = e.target.result;
                    // Binary check (null bytes)
                    if (content.includes('\0')) {
                        resolve(null);
                    } else {
                        resolve(content);
                    }
                };
                reader.onerror = () => resolve(null);
                reader.readAsText(file);
            });
        }

        function copyToClipboard(text) {
            if (!text) return;
            
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            textArea.style.top = "0";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showNotification();
                }
            } catch (err) {
                console.error('Copy failed', err);
            }
            
            document.body.removeChild(textArea);
        }

        function showNotification() {
            copyNotification.style.opacity = '1';
            copyNotification.style.transform = 'translate(-50%, 0)';
            setTimeout(() => {
                copyNotification.style.opacity = '0';
                copyNotification.style.transform = 'translate(-50%, 10px)';
            }, 2500);
        }
    </script>
</body>
</html>
